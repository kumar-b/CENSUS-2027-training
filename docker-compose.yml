version: '3.9'

services:
  api:
    build: ./server
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/data
      - ./QA:/app/QA:ro
    networks:
      - internal

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
